<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Écoles fermées au Québec</title>  

<style>
body{
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
}

.school {
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 6px;
}

.open {
    background-color: #e6f4ea;
}

.closed {
    background-color: #fdecea;
}

.nd {
    background-color: #f0f0f0;
}

#schools {
  width: 100%;
  border-collapse: collapse;
}
#schools th, #schools td {
  padding: 12px 10px;
  vertical-align: top;
}
#schools thead tr {
  border-bottom: 2px solid #ddd;
}
#schools tbody tr {
  border-bottom: 1px solid #eee;
}

/* Mobile: transforme chaque ligne en "carte" */
@media (max-width: 720px) {
  #schools thead {
    display: none;
  }

  #schools, #schools tbody, #schools tr, #schools td {
    display: block;
    width: 100%;
  }

#schools tbody tr {
  border: 1px solid #eee;
  border-radius: 10px;
  margin: 12px 0;
  overflow: hidden; /* important pour border-radius */
}

#schools td {
  padding: 12px 14px;
  border: none;
}

  /* Étiquettes avant les valeurs */
  #schools td:nth-child(2)::before {
    content: "▪️ Cours : ";
    font-weight: 200;
  }

  #schools td:nth-child(3)::before {
    content: "▪️ Service de garde : ";
    font-weight: 200;
  }
}

.region-row td{
  padding: 14px 10px;
  font-weight: 800;
  border-top: 2px solid #ddd;
  background: #fafafa;
}

@media (max-width: 720px){
  #schools td[style*="padding-left"]{
    padding-left: 2px !important;
  }
}

@media (max-width: 720px){
  #schools tr:not(.region-row):not(.css-row) td:first-child{
    padding-left: 10px !important;
  }
}

#schools tr:not(.region-row):not(.css-row) td:first-child strong{
  font-weight: 350;     /* enlève le bold */
}

</style>
</head>
<body>

<h1>Écoles fermées au Québec</h1>
<input 
  id="search" 
  type="text" 
  placeholder="Rechercher une école, un centre de services scolaire ou une région…" 
  style="width:100%;max-width:500px;padding:10px;font-size:15px;margin:15px 0;"
>
<div id="lastUpdate" style="margin:10px 0 15px 0;font-size:14px;color:#444;"></div>
<div style="margin-top:4px;1px solid #ddd;font-size:14px;color:#555;">
  <strong>n.d.</strong> = L'information n'est pas encore disponible. 
  Vérifiez auprès de votre centre de services scolaire.
<br></br>
</div>

<div id="loading" style="margin:10px 0;color:#666;">
  Chargement des données…
</div>

<table id="schools" style="width:100%;border-collapse:collapse;margin-top:20px;">
  <thead>
    <tr style="text-align:left;border-bottom:2px solid #ddd;">
      <th style="padding:10px;">Établissement</th>
      <th style="padding:10px;">Cours</th>
      <th style="padding:10px;">Service de garde</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6RX7tzUI7aOKNwpzr3dUf8XyPI_JqM8g",
  authDomain: "ecoles-fermees-interface.firebaseapp.com",
  projectId: "ecoles-fermees-interface",
  storageBucket: "ecoles-fermees-interface.firebasestorage.app",
  messagingSenderId: "462706468888",
  appId: "1:462706468888:web:e33ba594ebfeb36871fb6d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function norm(s){
  if (!s) return "n.d.";
  const v = String(s).trim();
  if (v === "ND" || v.toLowerCase() === "nd") return "n.d.";
  return v;
}

async function loadFromFirestore(){
  const loading = document.getElementById("loading");
  if (loading) loading.style.display = "block";

  const q = query(
    collection(db, "ecoles"),
    orderBy("region"),
    orderBy("css"),
    orderBy("name")
  );

  const snap = await getDocs(q);

  // IMPORTANT : on remplit la variable globale utilisée par render()
  window.allRows = snap.docs.map(d => {
    const x = d.data();
    return {
      name: x.name || "",
      css: x.css || "",
      region: x.region || "",
      statutCours: norm(x.statut_cours),
      statutGarde: norm(x.statut_garde),
    };
  });

  window.render(); // appelle ta fonction existante

  if (loading) loading.style.display = "none";
}

loadFromFirestore().catch(err => {
  console.error(err);
  const loading = document.getElementById("loading");
  if (loading) loading.textContent = "Erreur de chargement Firestore.";
});
</script></body>
</html>
