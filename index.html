<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Écoles fermées au Québec</title>  

<style>
  
body{
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
  
  background:#f6f8fb;
  color:#111827;
  margin:0;
}
  
.school {
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 6px;
}



#schools {
  width: 100%;
  border-collapse: collapse;
  margin-top:20px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

#schools th, #schools td {
  padding: 12px 10px;
  vertical-align: top;
}

#schools thead tr {
  background:#fafafa;
  border-bottom: 1px solid #e5e7eb;
}

#schools tbody tr {
  border-bottom: 1px solid #eee;
}

/* Mobile: transforme chaque ligne en "carte" */
@media (max-width: 720px) {
  #schools thead {
    display: none;
  }

  #schools, #schools tbody, #schools tr, #schools td {
    display: block;
    width: 100%;
  }

#schools tbody tr {
  border: 1px solid #eee;
  border-radius: 10px;
  margin: 12px 0;
  overflow: hidden; /* important pour border-radius */
}

#schools td {
  padding: 12px 14px;
  border: none;
}

  /* Étiquettes avant les valeurs */
  #schools td:nth-child(2)::before {
    content: "▪️ Cours : ";
    font-weight: 200;
  }

  #schools td:nth-child(3)::before {
    content: "▪️ Service de garde : ";
    font-weight: 200;
  }
}

.region-row td{
  padding: 14px 10px;
  font-weight: 700;
  border-top: 1px solid #e5e7eb;
  background: #f1f5f9;
  font-size:15px;
}

@media (max-width: 720px){
  #schools td[style*="padding-left"]{
    padding-left: 2px !important;
  }
}

@media (max-width: 720px){
  #schools tr:not(.region-row):not(.css-row) td:first-child{
    padding-left: 10px !important;
  }
}

#schools tr:not(.region-row):not(.css-row) td:first-child strong{
  font-weight: 350;     /* enlève le bold */
}

.filter-btn{
  padding:8px 14px;
  margin-right:6px;
  border-radius:999px;
  border:1px solid #d0d7de;
  background:#fff;
  cursor:pointer;
  font-size:14px;
  transition:all 0.15s ease;
}

.filter-btn:hover{
  background:#f3f4f6;
}

.filter-btn.active{
  background:#111827;
  color:#fff;
  border-color:#111827;
} 

.page{
  max-width:1100px;
  margin:0 auto;
  padding:24px 16px 40px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

.search-box #search{
  width:100%;
  padding:14px 16px 14px 46px;
  font-size:16px;
  border:1px solid #d0d7de;
  border-radius:12px;
  outline:none;
  box-sizing:border-box;
  background:#fff;
}

.search-box #search:focus{
  border-color:#6b7280;
  box-shadow:0 0 0 3px rgba(100,116,139,0.12);
}

/* CSS rows */
.css-row td{
  background:#f8fafc;
  font-size:14px;
}

/* Hover */
#schools tbody tr:hover{
  background:#f9fafb;
}  

.badge{
  display:inline-flex;
  align-items:center;
  padding:5px 10px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  line-height:1;
  white-space:nowrap;
}

.badge-green{
  background:#e8f5e9;
  color:#2e7d32;
}

.badge-red{
  background:#fdecea;
  color:#c62828;
}

.badge-gray{
  background:#f1f3f5;
  color:#555;
}

.search-box{
  position:relative;
  max-width:680px;
  margin:14px 0 6px 0;
}

.search-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:13px;
  opacity:0.5;
}  
  
</style>
  
</head>
<body>
<div class="page">
<h1>Écoles fermées au Québec</h1>
<div class="search-box">
  <span class="search-icon">🔎</span>
  <input 
    id="search" 
    type="text" 
    placeholder="Rechercher une école, un CSS ou une région…"
  >
</div>
  
  <div id="filters" style="margin:10px 0 15px 0;">
  <button class="filter-btn active" data-filter="all">Tout</button>
  <button class="filter-btn" data-filter="closed">Fermetures</button>
</div>
  
<div id="lastUpdate" style="margin:10px 0 15px 0;font-size:14px;color:#444;"></div>
<div style="margin-top:4px;border:1px solid #ddd;font-size:14px;color:#555;">
  &ensp;Cette application est en mode beta.<br> 
  &nbsp;<strong> n.d.</strong> = L'information n'est pas encore disponible ou n'a pas encore été mise à jour par Noovo Info. 
  Vérifiez auprès de votre centre de services scolaire.
</div>

<div id="loading" style="margin:10px 0;color:#666;">
  Chargement des données…
</div>

<table id="schools" style="width:100%;border-collapse:collapse;margin-top:20px;">
  <thead>
    <tr style="text-align:left;border-bottom:2px solid #ddd;">
      <th style="padding:10px;">Établissement</th>
      <th style="padding:10px;">Cours</th>
      <th style="padding:10px;">Service de garde</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<script>
  
let activeFilter = "all";
let allRows = [];

const uiState = {
  search: "",
  openRegions: new Set(),
  openCss: new Set(),
  isInteracting: false
};

function formatCours(status) {
  if (status === "Fermé") {
    return '<span class="badge badge-red">Suspendus</span>';
  }
  if (status === "Ouvert") {
   return '<span class="badge badge-green">Classes ouvertes</span>';
  }
  return '<span class="badge badge-gray">n.d.</span>';
}

function formatGarde(status) {
  if (status === "Fermé") {
    return '<span class="badge badge-red">Fermé</span>';
  }
  if (status === "Ouvert") {
    return '<span class="badge badge-green">Ouvert</span>';
  }
  return '<span class="badge badge-gray">n.d.</span>';
}

function captureUiState() {
  uiState.openRegions = new Set();
  uiState.openCss = new Set();

  document.querySelectorAll(".region-row").forEach(row => {
    const icon = row.querySelector('span[id$="-icon"]');
    if (!icon) return;

    const regionId = icon.id.replace("-icon", "");
    if (icon.textContent.trim() === "▼") {
      uiState.openRegions.add(regionId);
    }
  });

  document.querySelectorAll(".css-row").forEach(row => {
    const icon = row.querySelector('span[id$="-icon"]');
    if (!icon) return;

    const cssRegionId = icon.id.replace("-icon", "");
    if (icon.textContent.trim() === "▼") {
      uiState.openCss.add(cssRegionId);
    }
  });
}

function restoreUiState() {
  uiState.openRegions.forEach(regionId => {
    const icon = document.getElementById(`${regionId}-icon`);
    if (!icon) return;
    if (icon.textContent.trim() === "▼") return;

    const regionHeader = icon.closest(".region-row");
    if (regionHeader) regionHeader.click();
  });

  uiState.openCss.forEach(cssRegionId => {
    const icon = document.getElementById(`${cssRegionId}-icon`);
    if (!icon) return;
    if (icon.textContent.trim() === "▼") return;

    const cssHeader = icon.closest(".css-row");
    if (cssHeader) cssHeader.click();
  });
}

function render(filterText = uiState.search) {
  uiState.search = filterText;
  const tbody = document.querySelector("#schools tbody");
  tbody.innerHTML = "";

  const query = filterText.trim().toLowerCase();
  const autoExpand = query.length >= 5;

function cssId(regionId, css) {
  return regionId + "-css-" + (css || "Autre").replace(/[^a-z0-9]+/gi, "-").toLowerCase();
}

  // 1) Filtrer
  const filtered = allRows.filter(r => {

  // 🔎 filtre recherche
  const matchesSearch = !query || (
    r.name.toLowerCase().includes(query) ||
    r.css.toLowerCase().includes(query) ||
    r.region.toLowerCase().includes(query)
  );

  if (!matchesSearch) return false;

  // 🎯 filtre boutons
  if (activeFilter === "closed") {
    return r.statutCours === "Fermé";
  }

  return true;
});

  // 2) Regrouper par région
  const groups = {};
  filtered.forEach(r => {
    const region = r.region || "Autre";
    if (!groups[region]) groups[region] = [];
    groups[region].push(r);
  });

  function priorityRank(r) {
    if (r.statutCours === "Fermé") return 0;
    if (r.statutGarde === "Fermé") return 1;
    if (r.statutCours === "n.d." || r.statutGarde === "n.d.") return 3;
    return 2;
  }

  // 3) Rendre les régions (alphabétique)
  Object.keys(groups).sort((a,b)=>a.localeCompare(b,"fr")).forEach(region => {
    const regionId = "region-" + region.replace(/[^a-z0-9]+/gi, "-").toLowerCase();

    // Trier à l'intérieur de la région (priorités + alpha)
   groups[region].sort((a, b) => {
  const pa = priorityRank(a);
  const pb = priorityRank(b);
  if (pa !== pb) return pa - pb;

  const ca = (a.css || "").localeCompare((b.css || ""), "fr");
  if (ca !== 0) return ca;

  return (a.name || "").localeCompare((b.name || ""), "fr");
});

const cssGroups = {};
groups[region].forEach(r => {
  const css = r.css || "Autre";
  if (!cssGroups[css]) cssGroups[css] = [];
  cssGroups[css].push(r);
});


    // Compter écoles fermées (cours)
    const closedCount = groups[region].filter(r => r.statutCours === "Fermé").length;
    const closedLabel = `${closedCount} ${closedCount > 1 ? "écoles fermées" : "école fermée"}`;

    // Header région
    const headerTr = document.createElement("tr");
    headerTr.className = "region-row";
    headerTr.style.cursor = "pointer";
    headerTr.innerHTML = `
      <td colspan="3">
        <span id="${regionId}-icon" style="display:inline-block;width:18px;">${autoExpand ? "▼" : "▶"}</span>
        ${region}
        <span style="font-weight:400;color:#666;">(${closedLabel})</span>
      </td>
    `;
    tbody.appendChild(headerTr);

headerTr.addEventListener("click", () => {

  // 0) Si on est en <5 et que rien n'existe encore, on crée (lazy)
  let regionRows = Array.from(tbody.querySelectorAll(`tr[data-region="${regionId}"]`));

  if (!autoExpand && regionRows.length === 0) {

    Object.keys(cssGroups)
      .sort((a,b)=>a.localeCompare(b,"fr"))
      .reverse()
      .forEach(cssName => {

        const cssRegionId = cssId(regionId, cssName);
        const schools = cssGroups[cssName];

        // écoles cachées au départ
        for (let i = schools.length - 1; i >= 0; i--) {
          const r = schools[i];
          const row = document.createElement("tr");
          row.setAttribute("data-region", regionId);
          row.setAttribute("data-css", cssRegionId);
          row.style.display = "none";
          row.innerHTML = `
            <td style="padding-left:34px;"><strong>${r.name}</strong></td>
            <td>${formatCours(r.statutCours)}</td>
            <td>${formatGarde(r.statutGarde)}</td>
          `;
          headerTr.insertAdjacentElement("afterend", row);
        }

        // header CSS caché au départ
        const cssHeader = document.createElement("tr");
        cssHeader.className = "css-row";
        cssHeader.style.cursor = "pointer";
        cssHeader.setAttribute("data-region", regionId);
        cssHeader.setAttribute("data-css", cssRegionId);
        cssHeader.style.display = "none";

        const cssClosedCount = cssGroups[cssName].filter(r => r.statutCours === "Fermé").length;
        const cssClosedLabel = `${cssClosedCount} ${cssClosedCount > 1 ? "écoles fermées" : "école fermée"}`;

        cssHeader.innerHTML = `
          <td colspan="3" style="padding-left:26px;font-weight:700;">
            <span id="${cssRegionId}-icon" style="display:inline-block;width:18px;">▶</span>
            ${cssName}
            <span style="font-weight:400;color:#666;">(${cssClosedLabel})</span>
          </td>
        `;
        headerTr.insertAdjacentElement("afterend", cssHeader);

        // toggle CSS
        cssHeader.addEventListener("click", (e) => {
          e.stopPropagation();
          const schoolRows = Array.from(
            tbody.querySelectorAll(`tr[data-css="${cssRegionId}"]`)
          ).filter(tr => !tr.classList.contains("css-row"));

          const anyVisible = schoolRows.some(tr => tr.style.display !== "none");
          schoolRows.forEach(tr => tr.style.display = anyVisible ? "none" : "table-row");

          const icon = document.getElementById(`${cssRegionId}-icon`);
          if (icon) icon.textContent = anyVisible ? "▶" : "▼";
        });
      });

    // refresh après création
    regionRows = Array.from(tbody.querySelectorAll(`tr[data-region="${regionId}"]`));
  }

  // 1) Toggle région
  const regionIsOpen = regionRows.some(tr => tr.style.display !== "none");

  if (regionIsOpen) {
    regionRows.forEach(tr => tr.style.display = "none");
    const icon = document.getElementById(`${regionId}-icon`);
    if (icon) icon.textContent = "▶";
    return;
  }

  // ouvrir région
  const cssHeaders = regionRows.filter(tr => tr.classList.contains("css-row"));

  if (autoExpand) {
    // en autoExpand: tout visible
    regionRows.forEach(tr => tr.style.display = "table-row");
  } else {
    // en <5: montrer seulement les CSS, garder écoles cachées
    cssHeaders.forEach(tr => tr.style.display = "table-row");
    regionRows.forEach(tr => {
      if (!tr.classList.contains("css-row")) tr.style.display = "none";
    });
    // reset icônes CSS
    cssHeaders.forEach(h => {
      const id = h.getAttribute("data-css");
      const ic = document.getElementById(`${id}-icon`);
      if (ic) ic.textContent = "▶";
    });
  }

  const icon = document.getElementById(`${regionId}-icon`);
  if (icon) icon.textContent = "▼";
});

    // --- LAZY LOAD ---
    // Si autoExpand est actif (>=5), on rend tout de suite les lignes
    if (autoExpand) {

 Object.keys(cssGroups)
  .sort((a,b)=>a.localeCompare(b,"fr"))
  .forEach(cssName => {

    const cssRegionId = cssId(regionId, cssName);

    // Header CSS (cliquable)
    const cssHeader = document.createElement("tr");
    cssHeader.className = "css-row";
    cssHeader.style.cursor = "pointer";
    cssHeader.setAttribute("data-region", regionId);
    cssHeader.setAttribute("data-css", cssRegionId);
    const cssClosedCount = cssGroups[cssName].filter(r => r.statutCours === "Fermé").length;
const cssClosedLabel = `${cssClosedCount} ${cssClosedCount > 1 ? "écoles fermées" : "école fermée"}`;
    cssHeader.innerHTML = `
  <td colspan="3" style="padding-left:26px;font-weight:700;">
    <span id="${cssRegionId}-icon" style="display:inline-block;width:18px;">▼</span>
    ${cssName}
    <span style="font-weight:400;color:#666;">(${cssClosedLabel})</span>
  </td>
`;
    tbody.appendChild(cssHeader);

    // Écoles (avec data-css)
    cssGroups[cssName].forEach(r => {
      const row = document.createElement("tr");
      row.setAttribute("data-region", regionId);
      row.setAttribute("data-css", cssRegionId);
      row.style.display = "table-row";
      row.innerHTML = `
        <td style="padding-left:34px;">
          <strong>${r.name}</strong>
        </td>
        <td>${formatCours(r.statutCours)}</td>
        <td>${formatGarde(r.statutGarde)}</td>
      `;
      tbody.appendChild(row);
    });

    // Toggle CSS
    cssHeader.addEventListener("click", (e) => {
      e.stopPropagation(); // IMPORTANT: sinon ça déclenche aussi le toggle de région
      const rows = Array.from(tbody.querySelectorAll(`tr[data-css="${cssRegionId}"]`));
      // on exclut le header CSS lui-même
      const schoolRows = rows.filter(tr => !tr.classList.contains("css-row"));
      const anyVisible = schoolRows.some(tr => tr.style.display !== "none");
      schoolRows.forEach(tr => tr.style.display = anyVisible ? "none" : "table-row");
      document.getElementById(`${cssRegionId}-icon`).textContent = anyVisible ? "▶" : "▼";
    });

  });

}
}); // <-- ferme le forEach(region => { ... })

}  // <-- ferme la fonction render()

</script>
<script>
// Bind search UNE fois

const searchInput = document.getElementById("search");

if (searchInput) {
  searchInput.addEventListener("focus", () => {
    uiState.isInteracting = true;
  });

  searchInput.addEventListener("blur", () => {
    uiState.isInteracting = false;
  });

  searchInput.addEventListener("input", (e) => {
    uiState.search = e.target.value;
    render(uiState.search);
  });
}  

</script>

<script>
function norm(s){
  if (s === null || s === undefined) return "n.d.";
  const v = String(s).trim();
  const u = v.toUpperCase();

  if (u === "ND" || u === "N.D." || u === "N.D" || u === "N/A") return "n.d.";
  if (u === "OUVERT") return "Ouvert";
  if (u === "FERME" || u === "FERMÉ") return "Fermé";

  return v;
}

function formatLastUpdate(dateString){
  if (!dateString) return "";
  const d = new Date(dateString);

  if (Number.isNaN(d.getTime())) return "";

  const time = d.toLocaleTimeString("fr-CA", {
    hour: "2-digit",
    minute: "2-digit"
  });

  const date = d.toLocaleDateString("fr-CA", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });

  return `Dernière mise à jour: ${time} | ${date}`;
}

async function loadSnapshot() {
  const loading = document.getElementById("loading");
  const lastUpdateEl = document.getElementById("lastUpdate");
  
  if (uiState.isInteracting) return;

  try {
    if (loading) loading.style.display = "block";

    const res = await fetch(`./public_snapshot.json?v=${Date.now()}`, {
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const snapshot = await res.json();

    const rows = Array.isArray(snapshot)
      ? snapshot
      : Array.isArray(snapshot.rows)
        ? snapshot.rows
        : [];

captureUiState();
    
    allRows = rows.map(x => ({
      name: x.name || "",
      css: x.css || "",
      region: x.region || "",
      statutCours: norm(x.statut_cours ?? x.statutCours),
      statutGarde: norm(x.statut_garde ?? x.statutGarde),
    }));

    render(uiState.search);
restoreUiState();

    if (lastUpdateEl) {
      lastUpdateEl.textContent =
        formatLastUpdate(snapshot.generatedAt || snapshot.lastUpdate || snapshot.updated_at)
        || "Dernière mise à jour indisponible.";
    }

    if (loading) loading.style.display = "none";
  } catch (err) {
    console.error(err);
    if (loading) {
      loading.textContent = "Erreur de chargement des données.";
    }
  }
}

loadSnapshot();
setInterval(loadSnapshot, 15000);
</script>
  
<script>
function sendHeight() {
  const height = Math.max(
    document.body.scrollHeight,
    document.documentElement.scrollHeight
  );

  parent.postMessage({ iframeHeight: height }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

const observer = new MutationObserver(() => {
  sendHeight();
});

observer.observe(document.body, {
  childList: true,
  subtree: true,
  attributes: true
});

setTimeout(sendHeight, 300);
setTimeout(sendHeight, 1000);
</script>
  
  <script>

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    activeFilter = btn.dataset.filter;

    render(uiState.search);
  });
});
</script>
</div>  
</body>
</html>
