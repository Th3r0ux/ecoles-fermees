    const AUTO_LOGOUT_MS = 2 * 60 * 60 * 1000; // 2h
const AUTO_LOGOUT_KEY = "autoLogoutAt";
let autoLogoutTimer = null;

function clearAutoLogoutTimer() {
  if (autoLogoutTimer) {
    clearTimeout(autoLogoutTimer);
    autoLogoutTimer = null;
  }
}

async function forceLogout() {
  clearAutoLogoutTimer();
  localStorage.removeItem(AUTO_LOGOUT_KEY);
  await supabase.auth.signOut({ scope: "local" });
  await refreshUI();
}

function scheduleAutoLogout() {
  clearAutoLogoutTimer();

  // si pas déjà un deadline, on en crée un
  let at = Number(localStorage.getItem(AUTO_LOGOUT_KEY));
  if (!at || Number.isNaN(at)) {
    at = Date.now() + AUTO_LOGOUT_MS;
    localStorage.setItem(AUTO_LOGOUT_KEY, String(at));
  }

  const msLeft = at - Date.now();

  // si déjà dépassé → logout immédiat
  if (msLeft <= 0) {
    forceLogout();
    return;
  }

  // sinon → timer
  autoLogoutTimer = setTimeout(() => {
    forceLogout();
  }, msLeft);
}

    async function fetchAllRowsPaged(table, select, orders = []) {
      const pageSize = 1000;
      let from = 0;
      let all = [];

      while (true) {
        let q = supabase.from(table).select(select);

        for (const o of orders) {
          q = q.order(o.col, { ascending: o.asc });
        }

        const { data, error } = await q.range(from, from + pageSize - 1);
        if (error) throw error;

        all = all.concat(data);
        if (data.length < pageSize) break;
        from += pageSize;
      }

      return all;
    }

  // Helpers IDs (comme index)
  function slug(s){
    return String(s || "Autre").replace(/[^a-z0-9]+/gi, "-").toLowerCase();
  }
  function regionId(region){ return "region-" + slug(region); }
  function cssId(rid, css){ return rid + "-css-" + slug(css || "Autre"); }

  function normVal(v){
    if (v === null || v === undefined) return "ND";
    const t = String(v).trim();
    const u = t.toUpperCase();
    if (u === "ND" || u === "N.D." || u === "N.D" || u === "N/A") return "ND";
    if (u === "OUVERT") return "Ouvert";
    if (u === "FERME" || u === "FERMÉ") return "Fermé";
    return t;
  }

      function getWindowBounds() {
    const now = new Date();

    const start = new Date(now);
    const end = new Date(now);

    const minutesNow = now.getHours() * 60 + now.getMinutes();
    const cutoffMorning = 7 * 60 + 45; // 07:45
    const startEvening = 15 * 60;      // 15:00

    if (minutesNow >= startEvening) {
      start.setHours(15, 0, 0, 0);
      end.setDate(end.getDate() + 1);
      end.setHours(7, 45, 0, 0);
    } else {
      start.setDate(start.getDate() - 1);
      start.setHours(15, 0, 0, 0);
      end.setHours(7, 45, 0, 0);
    }

    return { start, end, now };
  }

  function isUpdatedInWindow(updatedAt) {
    if (!updatedAt) return false;

    const ts = new Date(updatedAt);
    if (Number.isNaN(ts.getTime())) return false;

    const { start, end, now } = getWindowBounds();
    const effectiveEnd = end > now ? now : end;

    return ts >= start && ts <= effectiveEnd;
  }

  function cssHasWindowUpdate(regionName, cssName) {
    return schools.some(s =>
      (s.region || "Autre") === regionName &&
      (s.css || "Autre") === cssName &&
      isUpdatedInWindow(s.manual_updated_at)
    );
  }

  function cssCheckmarkHTML(regionName, cssName) {
    return cssHasWindowUpdate(regionName, cssName)
      ? `<span class="css-checkmark" title="Au moins une modification entre 15 h et 7 h 45">✔</span>`
      : "";
  }

  function groupByRegionAndCss(arr){
    const groups = {};
    for (const s of arr){
      const r = s.region || "Autre";
      const c = s.css || "Autre";

      if (!groups[r][c]) groups[r][c] = [];
      groups[r][c].push(s);
    }
    return groups;
  }

        const rid = clickable.getAttribute("data-region");
        const cid = clickable.getAttribute("data-css");
        if (!rid || !cid) return;

        // toggle écoles de ce CSS
        const regionContainer = list.querySelector(`[data-region-container="${rid}"]`);
        if (!regionContainer) return;

        const cards = Array.from(
          regionContainer.querySelectorAll(`[data-kind="school"][data-css="${cid}"]`)
        );

        const anyVisible = cards.some(c => c.style.display !== "none");
        cards.forEach(c => c.style.display = anyVisible ? "none" : "block");

        const icon = document.getElementById(`${cid}-icon`);
        if (icon) icon.textContent = anyVisible ? "▶" : "▼";

        if (!anyVisible) {
  clickable.scrollIntoView({ behavior: "smooth", block: "start" });
}
      }
    });

    list.dataset.bound = "1";

    if (!list.dataset.boundSelect) {
  list.addEventListener("change", (e) => {
    const t = e.target;
    if (!(t instanceof HTMLInputElement)) return;
    if (t.type !== "checkbox") return;
    if (t.dataset.action !== "select") return;

    const id = t.dataset.id;
    if (!id) return;

    if (t.checked) selected.add(id);
    else selected.delete(id);

    refreshBatchBar();
  });

  list.dataset.boundSelect = "1";
}
  }

if (!batchBar.dataset.bound) {
  // Cours
  document.getElementById("batchCoursND").addEventListener("click", () => batchSetSelected("cours", "ND"));
  document.getElementById("batchCoursOpen").addEventListener("click", () => batchSetSelected("cours", "Ouvert"));
  document.getElementById("batchCoursClose").addEventListener("click", () => batchSetSelected("cours", "Fermé"));

  // Garde
  document.getElementById("batchGardeND").addEventListener("click", () => batchSetSelected("garde", "ND"));
  document.getElementById("batchGardeOpen").addEventListener("click", () => batchSetSelected("garde", "Ouvert"));
  document.getElementById("batchGardeClose").addEventListener("click", () => batchSetSelected("garde", "Fermé"));

  // Tout
  document.getElementById("batchBothND").addEventListener("click", () => batchSetSelected("both", "ND"));
  document.getElementById("batchBothOpen").addEventListener("click", () => batchSetSelected("both", "Ouvert"));
  document.getElementById("batchBothClose").addEventListener("click", () => batchSetSelected("both", "Fermé"));

  // Master
  document.getElementById("masterND").addEventListener("click", () => masterSetAll("ND"));
  document.getElementById("masterOpen").addEventListener("click", () => masterSetAll("Ouvert"));
  document.getElementById("masterClose").addEventListener("click", () => masterSetAll("Fermé"));

  // Clear
  document.getElementById("batchClear").addEventListener("click", () => {
    selected.clear();
    document.querySelectorAll('input[type="checkbox"][data-action="select"]').forEach(cb => {
      cb.checked = false;
    });
    refreshBatchBar();
  });

  // Retrait d’un tag
  batchSelectedNames.addEventListener("click", (e) => {
    const target = e.target.closest('[data-action="remove-tag"]');
    if (!target) return;

    e.preventDefault();
    e.stopPropagation();

    const id = target.dataset.id;
    if (!id) return;

    selected.delete(id);

    const checkbox = document.querySelector(
      `input[type="checkbox"][data-action="select"][data-id="${id}"]`
    );
    if (checkbox) {
      checkbox.checked = false;
    }

    refreshBatchBar();
  });

  batchBar.dataset.bound = "1";
}
      
      msg.textContent = "";
}

    function updateScrollHint(){
  const hint = document.getElementById("scrollHint");
  if (!hint) return;

  const doc = document.documentElement;

  // Hauteur totale réelle scrollable
  const scrollHeight = doc.scrollHeight;
  const viewport = window.innerHeight;

  // 1) Si la page ne scroll même pas, on cache le gradient
  if (scrollHeight <= viewport + 2){
    hint.classList.add("hidden");
    return;
  }

  // 2) Si on est proche du bas, on cache le gradient
  const nearBottom = (window.scrollY + viewport) >= (scrollHeight - 12);
  hint.classList.toggle("hidden", nearBottom);
}

window.addEventListener("scroll", updateScrollHint, { passive: true });
window.addEventListener("resize", updateScrollHint);
setTimeout(updateScrollHint, 0);
    
  </script>
  <div id="scrollHint"></div>
