<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Écoles fermées</title>
</head>
<body>
  <h1>Admin</h1>

  <div id="msg" style="margin:10px 0;color:#b00;"></div>

  <div id="loginBox">
    <input id="email" type="email" placeholder="Email" style="display:block;margin:8px 0;padding:10px;width:320px;">
    <input id="password" type="password" placeholder="Mot de passe" style="display:block;margin:8px 0;padding:10px;width:320px;">
    <button id="loginBtn" style="padding:10px 14px;">Se connecter</button>
  </div>

  <div id="okBox" style="display:none;">
    <p>✅ Connecté.</p>
    <button id="logoutBtn" style="padding:10px 14px;">Se déconnecter</button>
  </div>

  <div id="list" style="margin-top:16px;"></div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://djcexcxyxtfazejhstcn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_TChgyvE4kQSVxpoPUUWZlA_5RYkPzM3";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const msg = document.getElementById("msg");
    const loginBox = document.getElementById("loginBox");
    const okBox = document.getElementById("okBox");

    async function refreshUI() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        loginBox.style.display = "none";
        okBox.style.display = "block";
      } else {
        loginBox.style.display = "block";
        okBox.style.display = "none";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      msg.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) msg.textContent = error.message;
      await refreshUI();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      await refreshUI();
    });

    refreshUI();

    async function fetchAllRowsPaged(table, select, orders = []) {
  const pageSize = 1000;
  let from = 0;
  let all = [];

  while (true) {
    let q = supabase.from(table).select(select);

    for (const o of orders) {
      q = q.order(o.col, { ascending: o.asc });
    }

    const { data, error } = await q.range(from, from + pageSize - 1);

    if (error) throw error;

    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }

  return all;
}

async function loadAllWithButtons() {
  msg.textContent = "Chargement…";

  let schools = [];
  let statuses = [];

  try {
    schools = await fetchAllRowsPaged(
      "schools",
      "id,name,region",
      [{ col: "region", asc: true }, { col: "name", asc: true }]
    );

    statuses = await fetchAllRowsPaged(
      "school_status",
      "school_id,statut_cours,statut_garde,updated_at"
    );
  } catch (err) {
    console.error(err);
    msg.textContent = "Erreur chargement: " + (err.message || err);
    return;
  }

  const statusById = new Map(statuses.map(st => [st.school_id, st]));

  const list = document.getElementById("list");
  list.innerHTML = "";

  for (const s of schools) {
    const st = statusById.get(s.id);
    const cours = st?.statut_cours ?? "ND";

    const row = document.createElement("div");
    row.style.border = "1px solid #ddd";
    row.style.borderRadius = "10px";
    row.style.padding = "10px";
    row.style.margin = "10px 0";

    row.innerHTML = `
      <div style="font-weight:700;">${s.name}</div>
      <div style="color:#666;font-size:13px;margin:3px 0 10px 0;">${s.region}</div>
      <div style="margin-bottom:8px;">Cours: <strong id="cours-${s.id}">${cours}</strong></div>
      <button data-id="${s.id}" data-val="ND">ND</button>
      <button data-id="${s.id}" data-val="Ouvert">Ouvert</button>
      <button data-id="${s.id}" data-val="Fermé">Fermé</button>
      <span id="saved-${s.id}" style="margin-left:10px;color:#2e7d32;"></span>
    `;

    list.appendChild(row);
  }

  // handler unique
  list.addEventListener("click", async (e) => {
    const btn = e.target;
    if (!(btn instanceof HTMLButtonElement)) return;

    const schoolId = btn.dataset.id;
    const val = btn.dataset.val;
    if (!schoolId || !val) return;

    const saved = document.getElementById(`saved-${schoolId}`);
    if (saved) {
      saved.style.color = "#666";
      saved.textContent = "…";
    }

    const { data: userData } = await supabase.auth.getUser();
    const uid = userData?.user?.id ?? null;

    const { error } = await supabase
      .from("school_status")
      .update({
        statut_cours: val,
        updated_at: new Date().toISOString(),
        updated_by: uid
      })
      .eq("school_id", schoolId);

    if (error) {
      console.error(error);
      if (saved) {
        saved.style.color = "#b00";
        saved.textContent = "Erreur";
      }
      return;
    }

    // update UI
    const coursEl = document.getElementById(`cours-${schoolId}`);
    if (coursEl) coursEl.textContent = val;

    if (saved) {
      saved.style.color = "#2e7d32";
      saved.textContent = "Enregistré ✅";
    }
  }, { once: true });

  msg.textContent = `✅ Chargé: ${schools.length} écoles`;
}

// après login, on charge la liste
await loadAllWithButtons();
    
  </script>
</body>
</html>
