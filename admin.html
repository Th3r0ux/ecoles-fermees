<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Écoles fermées</title>
</head>
<body>
  <h1>Admin</h1>

  <div id="msg" style="margin:10px 0;color:#b00;"></div>

  <div id="loginBox">
    <input id="email" type="email" placeholder="Email" style="display:block;margin:8px 0;padding:10px;width:320px;">
    <input id="password" type="password" placeholder="Mot de passe" style="display:block;margin:8px 0;padding:10px;width:320px;">
    <button id="loginBtn" style="padding:10px 14px;">Se connecter</button>
  </div>

  <div id="okBox" style="display:none;">
    <p>✅ Connecté.</p>
    <button id="logoutBtn" style="padding:10px 14px;">Se déconnecter</button>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://djcexcxyxtfazejhstcn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_TChgyvE4kQSVxpoPUUWZlA_5RYkPzM3";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const msg = document.getElementById("msg");
    const loginBox = document.getElementById("loginBox");
    const okBox = document.getElementById("okBox");

    async function refreshUI() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        loginBox.style.display = "none";
        okBox.style.display = "block";
      } else {
        loginBox.style.display = "block";
        okBox.style.display = "none";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      msg.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) msg.textContent = error.message;
      await refreshUI();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      await refreshUI();
    });

    refreshUI();
    async function testReadSchools() {
  msg.textContent = "";

  const { data, error } = await supabase
    .from("schools")
    .select("id,name,region")
    .order("region", { ascending: true })
    .order("name", { ascending: true })
    .limit(10);

  if (error) {
    console.error(error);
    msg.textContent = "Erreur lecture schools: " + error.message;
    return;
  }

  console.log("SCHOOLS (10):", data);
  msg.textContent = "✅ Lecture OK (voir console pour 10 écoles).";
}

await testReadSchools();
  </script>
</body>
</html>
